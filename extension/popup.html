<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: #15202b;
      color: #e7e9ea;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #1d9bf0;
    }
    .stat {
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      margin: 12px 0;
    }
    .stat-label {
      font-size: 12px;
      color: #8b98a5;
      text-align: center;
      margin-bottom: 12px;
    }
    .last-info {
      font-size: 11px;
      color: #8b98a5;
      text-align: center;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: #1d9bf0;
      color: white;
    }
    .btn-primary:hover { background: #1a8cd8; }
    .btn-danger {
      background: transparent;
      color: #f4212e;
      border: 1px solid #67070f;
    }
    .btn-danger:hover { background: #1c0a0e; }
    .status {
      font-size: 11px;
      color: #1d9bf0;
      text-align: center;
      margin-top: 8px;
      min-height: 16px;
    }
    .info {
      font-size: 10px;
      color: #536471;
      text-align: center;
      margin-top: 12px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h2>X Bookmark Summarizer</h2>
  <div class="stat" id="count">0</div>
  <div class="stat-label">bookmarks captured</div>
  <div class="last-info" id="lastInfo"></div>

  <button class="btn-primary" id="exportBtn">Export Now</button>
  <button class="btn-danger" id="clearBtn">Clear All Bookmarks</button>
  <div class="status" id="status"></div>
  <div class="info">Digest sent daily at 6 AM IST via Telegram.<br>Keep your bookmarks tab pinned.</div>
  <script src="popup.js"></script>
</body>
</html>
